<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Analytics Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-primary:#09090b;
      --bg-secondary:#111116;
      --bg-card:#18181b;
      --bg-hover:#1e1e24;
      --border:#27272a;
      --border-l:#3f3f46;
      --text-p:#fafafa;
      --text-s:#a1a1aa;
      --text-m:#52525b;
      --purple:#a855f7;
      --pink:#ec4899;
      --orange:#f97316;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --ig:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
    }
    html{font-size:14px}
    body{background:var(--bg-primary);color:var(--text-p);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--bg-secondary)}
    ::-webkit-scrollbar-thumb{background:var(--border-l);border-radius:3px}

    /* ── Shared ── */
    .ig-text{background:var(--ig);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .ig-ring{background:var(--ig);border-radius:50%;display:inline-flex;flex-shrink:0}
    .ig-ring-inner{background:var(--bg-card);border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden}

    /* ── Header ── */
    .hdr{background:rgba(9,9,11,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:12px 0}
    .hdr-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-ic{width:34px;height:34px;background:var(--ig);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .logo-txt{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
    .hdr-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}

    /* ── Timeframe ── */
    .tf{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-s);cursor:pointer;font-size:.79rem;font-weight:500;transition:all .15s;white-space:nowrap}
    .tf:hover{border-color:var(--border-l);color:var(--text-p)}
    .tf.on{background:linear-gradient(135deg,rgba(168,85,247,.22),rgba(236,72,153,.22));border-color:var(--purple);color:var(--text-p)}
    .date-in{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-p);font-size:.79rem;outline:none}
    .date-in:focus{border-color:var(--purple)}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.65);cursor:pointer}

    /* ── Gear button ── */
    .gear-btn{position:relative;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-s);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .gear-btn:hover{border-color:var(--border-l);color:var(--text-p);background:var(--bg-hover)}
    .gear-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--bg-primary)}

    /* ── Summary strip ── */
    .strip{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:10px 0}
    .strip-inner{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
    .s-item{display:flex;flex-direction:column;gap:2px}
    .s-lbl{font-size:.67rem;color:var(--text-m);text-transform:uppercase;letter-spacing:.05em}
    .s-val{font-size:1.08rem;font-weight:700}
    .s-div{width:1px;height:28px;background:var(--border)}

    /* ── Layout ── */
    .wrap{max-width:1440px;margin:0 auto;padding:0 20px}
    .main{padding:22px 0 70px}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
    .sec-title{font-size:.94rem;font-weight:600;color:var(--text-s);display:flex;align-items:center;gap:8px}
    .sec-title span{color:var(--purple)}
    .add-btn{display:flex;align-items:center;gap:7px;padding:7px 17px;border-radius:10px;border:none;background:var(--ig);color:#fff;font-size:.86rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
    .add-btn:hover{opacity:.87;transform:translateY(-1px)}
    .add-btn:active{transform:none}

    /* ── Category filter tabs ── */
    .cat-tabs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .cat-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-s);cursor:pointer;font-size:.79rem;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
    .cat-tab:hover{border-color:var(--border-l);color:var(--text-p)}
    .cat-tab.on{background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(236,72,153,.2));border-color:var(--purple);color:var(--text-p)}
    .cat-count{background:rgba(168,85,247,.2);color:var(--purple);border-radius:20px;padding:0 6px;font-size:.68rem;font-weight:700}

    /* ── Cards grid ── */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:14px;margin-bottom:26px}

    /* ── Profile card ── */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .card::after{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:var(--ig);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .2s;pointer-events:none}
    .card:hover{background:var(--bg-hover);transform:translateY(-2px);box-shadow:0 10px 34px rgba(0,0,0,.45)}
    .card:hover::after,.card.sel::after{opacity:1}
    .card.sel{background:var(--bg-hover)}

    .c-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
    .c-prof{display:flex;align-items:center;gap:11px}
    .c-name{font-weight:700;font-size:.92rem;display:flex;align-items:center;gap:5px}
    .c-handle{color:var(--text-s);font-size:.77rem;margin-top:2px}
    .c-tag{font-size:.67rem;padding:2px 7px;border-radius:20px;background:rgba(168,85,247,.13);color:var(--purple);border:1px solid rgba(168,85,247,.27);margin-top:4px;display:inline-block}
    .badge{display:flex;align-items:center;gap:3px;font-size:.71rem;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap}
    .badge.up{background:rgba(34,197,94,.13);color:var(--green)}
    .badge.dn{background:rgba(239,68,68,.13);color:var(--red)}
    .arr{font-size:.58rem}

    /* ── Delete button ── */
    .del-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);color:rgba(239,68,68,.75);border-radius:7px;cursor:pointer;font-size:.72rem;padding:3px 7px;transition:all .15s;white-space:nowrap}
    .del-btn:hover{background:rgba(239,68,68,.22);color:var(--red);border-color:var(--red)}

    .c-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
    .met{display:flex;flex-direction:column;gap:2px}
    .met-lbl{font-size:.64rem;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em}
    .met-val{font-size:.93rem;font-weight:700}
    .met-er{color:var(--pink)}

    /* ── Sparkline ── */
    svg.spark{display:block;width:100%;overflow:visible}

    /* ── Detail panel ── */
    .detail{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:26px;animation:fadein .22s ease}
    @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .d-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .d-prof{display:flex;align-items:center;gap:14px}
    .d-name{font-size:1.12rem;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .d-handle{color:var(--text-s);font-size:.86rem;margin-top:3px;display:flex;align-items:center;flex-wrap:wrap;gap:6px}
    .d-actions{display:flex;gap:8px;align-items:center}
    .close-btn{width:33px;height:33px;border-radius:9px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-s);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.92rem;transition:all .15s;flex-shrink:0}
    .close-btn:hover{background:var(--bg-hover);color:var(--text-p)}

    /* ── Tabs ── */
    .tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border)}
    .tab{padding:9px 16px;border:none;background:transparent;color:var(--text-m);font-size:.82rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
    .tab:hover{color:var(--text-p)}
    .tab.on{color:var(--text-p);border-bottom-color:var(--purple)}

    /* ── Sort bar ── */
    .sort-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .sort-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-s);cursor:pointer;font-size:.76rem;font-weight:500;transition:all .15s;white-space:nowrap}
    .sort-btn:hover{border-color:var(--border-l);color:var(--text-p)}
    .sort-btn.on{background:rgba(168,85,247,.18);border-color:var(--purple);color:var(--text-p)}

    /* ── Detail stats ── */
    .d-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:12px;margin-bottom:20px}
    .ds{background:var(--bg-secondary);border:1px solid var(--border);border-radius:11px;padding:14px}
    .ds-lbl{font-size:.67rem;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
    .ds-val{font-size:1.2rem;font-weight:700;background:var(--ig);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .ds-d{font-size:.71rem;margin-top:3px}
    .dg{color:var(--green)}
    .dr{color:var(--red)}
    .chart-wrap{position:relative;height:252px;width:100%}

    /* ── Posts grid ── */
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px}
    .post{background:var(--bg-secondary);border:1px solid var(--border);border-radius:11px;padding:13px}
    .post-type{font-size:.69rem;color:var(--text-m);margin-bottom:7px;display:flex;align-items:center;gap:5px}
    .post-row{display:flex;justify-content:space-between;margin-top:5px}
    .post-v{font-size:.87rem;font-weight:600}
    .post-l{font-size:.65rem;color:var(--text-m)}
    .post-er{font-size:.77rem;color:var(--pink);font-weight:600;margin-top:7px}

    /* ── Modal ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.74);backdrop-filter:blur(7px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .15s ease}
    .modal{background:var(--bg-card);border:1px solid var(--border-l);border-radius:20px;padding:26px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
    .m-title{font-size:1.06rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:9px}
    .m-ic{width:30px;height:30px;background:var(--ig);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .m-field{margin-bottom:14px}
    .m-lbl{font-size:.75rem;color:var(--text-s);margin-bottom:5px;display:block}
    .m-in{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-p);font-size:.87rem;outline:none;transition:border-color .15s}
    .m-in:focus{border-color:var(--purple)}
    .m-in::placeholder{color:var(--text-m)}
    .m-in:disabled{opacity:.55;cursor:not-allowed}
    .m-hint{font-size:.69rem;color:var(--text-m);margin-top:4px}
    .m-actions{display:flex;gap:8px;margin-top:20px}
    .btn-cancel{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text-s);font-size:.87rem;cursor:pointer;transition:all .15s}
    .btn-cancel:hover{background:var(--bg-secondary);color:var(--text-p)}
    .btn-cancel:disabled{opacity:.4;cursor:not-allowed}
    .btn-add{flex:2;padding:10px;border-radius:9px;border:none;background:var(--ig);color:#fff;font-size:.87rem;font-weight:600;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:7px}
    .btn-add:hover{opacity:.87}
    .btn-add:disabled{opacity:.42;cursor:not-allowed}

    /* ── Info box ── */
    .info-box{border-radius:10px;padding:11px 13px;margin-bottom:14px;font-size:.78rem;line-height:1.6}
    .info-purple{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);color:var(--text-s)}
    .info-orange{background:rgba(249,115,22,.09);border:1px solid rgba(249,115,22,.24);color:#fdba74}
    .info-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}

    /* ── Toast ── */
    .toast{position:fixed;bottom:20px;right:20px;background:var(--bg-card);border:1px solid var(--border-l);border-radius:12px;padding:12px 17px;font-size:.82rem;z-index:400;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.55);animation:slideup .22s ease;max-width:380px}
    @keyframes slideup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    .toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

    /* ── Live badge ── */
    .live-badge{font-size:.66rem;padding:2px 7px;border-radius:20px;background:rgba(34,197,94,.13);color:var(--green);border:1px solid rgba(34,197,94,.27)}
    .verified-ic{color:var(--blue);font-size:.75rem}

    /* ── Spinner ── */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.28);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

    /* ── Empty state ── */
    .empty{text-align:center;padding:60px 20px;color:var(--text-m)}
    .empty-ic{font-size:2.6rem;margin-bottom:10px}
    .empty-t{font-size:.87rem;line-height:1.65}

    /* ── Responsive ── */
    @media(max-width:640px){
      .hdr-inner{flex-direction:column;align-items:flex-start}
      .grid{grid-template-columns:1fr}
      .d-stats{grid-template-columns:1fr 1fr}
    }

    /* ── Code tag ── */
    code{background:var(--bg-secondary);padding:1px 5px;border-radius:4px;font-size:.85em;color:var(--purple)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ================================================================
   STORAGE HELPERS
   ================================================================ */
const LS_PROFILES = "igm_profiles_v3";
const LS_APIKEY   = "igm_rapidapi_key";

const saveProfiles = list => {
  try { localStorage.setItem(LS_PROFILES, JSON.stringify(list)); } catch(e) {}
};
const loadProfiles = () => {
  try { const r = localStorage.getItem(LS_PROFILES); return r ? JSON.parse(r) : null; } catch(e) { return null; }
};
const saveApiKey = k => {
  try { localStorage.setItem(LS_APIKEY, k); } catch(e) {}
};
const loadApiKey = () => {
  try { return localStorage.getItem(LS_APIKEY) || ""; } catch(e) { return ""; }
};

/* ================================================================
   UTILITIES
   ================================================================ */
const fmt = n =>
  n >= 1_000_000 ? (n / 1_000_000).toFixed(1) + "M" :
  n >= 1_000     ? (n / 1_000).toFixed(1) + "k"     : String(Math.round(n));

const fmtDelta = n => (n >= 0 ? "+" : "−") + fmt(Math.abs(n));

const rnd = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

const genSeries = (base, pts, vol = 0.014, trend = 0.003) => {
  const out = [];
  let v = base * (1 - trend * pts * 0.6);
  for (let i = 0; i < pts; i++) {
    v = Math.max(1, v * (1 + trend + (Math.random() - 0.47) * vol));
    out.push(Math.round(v));
  }
  out[pts - 1] = Math.round(base);
  return out;
};

const TF = {
  "1Д": { pts: 24, unit: "hour",  label: "1 День"   },
  "1Н": { pts:  7, unit: "day",   label: "1 Неделя" },
  "1М": { pts: 30, unit: "day",   label: "1 Месяц"  },
  "1Г": { pts: 12, unit: "month", label: "1 Год"    },
};

const makeDates = (pts, unit) => {
  const now = new Date(), out = [];
  for (let i = pts - 1; i >= 0; i--) {
    const d = new Date(now);
    if      (unit === "hour")  d.setHours(d.getHours() - i);
    else if (unit === "day")   d.setDate(d.getDate() - i);
    else if (unit === "month") d.setMonth(d.getMonth() - i);
    out.push(d);
  }
  return out;
};

const dlabel = (d, unit) => {
  if (unit === "hour")  return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
  if (unit === "day")   return d.toLocaleDateString("ru-RU", { day: "numeric",  month: "short" });
  if (unit === "month") return d.toLocaleDateString("ru-RU", { month: "short",  year: "2-digit" });
};

const parseHandle = raw => {
  const s = raw.trim();
  const m = s.match(/instagram\.com\/([^/?#\s]+)/i);
  if (m) return m[1].replace(/\/$/, "").toLowerCase();
  return s.replace(/^@/, "").trim().toLowerCase();
};

/* ================================================================
   AVATAR PALETTES
   ================================================================ */
const PALETTE = [
  { emoji: "🌟", color: "#7c3aed" }, { emoji: "🔥", color: "#dc2626" },
  { emoji: "💎", color: "#0891b2" }, { emoji: "🌈", color: "#059669" },
  { emoji: "⚡", color: "#d97706" }, { emoji: "🎯", color: "#db2777" },
  { emoji: "🚀", color: "#4f46e5" }, { emoji: "🌸", color: "#be185d" },
  { emoji: "🦁", color: "#92400e" }, { emoji: "🌊", color: "#0e7490" },
  { emoji: "🎨", color: "#7e22ce" }, { emoji: "🏆", color: "#b45309" },
];
let _pi = 0;
const nextPal = () => PALETTE[_pi++ % PALETTE.length];

const PRESET_AV = {
  natgeo: { emoji: "🌿", color: "#16a34a" },
  nasa:   { emoji: "🚀", color: "#1d4ed8" },
  nike:   { emoji: "✓",  color: "#171717" },
  dior:   { emoji: "✦",  color: "#78350f" },
};

/* ================================================================
   BUILD PROFILE — creates full profile with synthetic time series
   ================================================================ */
const POST_TYPES = [
  { type: "Фото",     icon: "🖼️" },
  { type: "Видео",    icon: "🎬" },
  { type: "Reels",    icon: "🎞️" },
  { type: "Карусель", icon: "🗂️" },
];

const buildProfile = ({ id, username, name, tag, followers, avgLikes, er,
                        avatarKey = null, avatarUrl = null,
                        realPosts = null, verified = false }) => {
  /* Avatar */
  let av;
  if (avatarUrl) {
    const fb = nextPal();
    av = { type: "image", url: avatarUrl, fbEmoji: fb.emoji, fbColor: fb.color };
  } else {
    const pre = avatarKey && PRESET_AV[avatarKey];
    av = pre ? { type: "emoji", ...pre } : (() => { const p = nextPal(); return { type: "emoji", emoji: p.emoji, color: p.color }; })();
  }

  /* Time series for every timeframe */
  const series = {};
  Object.entries(TF).forEach(([key, { pts }]) => {
    series[key] = {
      followers: genSeries(followers,         pts, 0.012, 0.004),
      likes:     genSeries(avgLikes,          pts, 0.025, 0.003),
      comments:  genSeries(avgLikes * 0.07,   pts, 0.030, 0.002),
      er:        genSeries(Math.max(er, 0.1), pts, 0.018, 0.001),
    };
  });

  const todayDelta = followers - series["1Д"].followers[0];

  /* Posts — use real ones if provided, otherwise synthetic */
  const posts = realPosts && realPosts.length > 0
    ? realPosts
    : Array.from({ length: 6 }, (_, i) => ({
        id: i,
        ...POST_TYPES[i % 4],
        likes:    rnd(Math.round(avgLikes * 0.55), Math.round(avgLikes * 1.45)),
        comments: rnd(Math.round(avgLikes * 0.03), Math.round(avgLikes * 0.13)),
        er:       Math.max(0, +(Math.random() * 3 + er - 0.6)).toFixed(2),
      }));

  return {
    id,
    username: username.startsWith("@") ? username : "@" + username,
    name,
    tag,
    followers,
    avgLikes,
    er: Math.max(0, er),
    av,
    series,
    todayDelta,
    posts,
    verified,
    isReal: !!avatarUrl,
    addedAt: Date.now(),
  };
};

/* ================================================================
   REAL API FETCH — instagram-scraper-api2 on RapidAPI
   ================================================================ */
const API_HOST = "instagram-scraper-api2.p.rapidapi.com";

const fetchRealProfile = async (handle, apiKey, tag) => {
  const headers = {
    "x-rapidapi-host": API_HOST,
    "x-rapidapi-key":  apiKey,
  };

  /* 1. User info */
  const infoRes = await fetch(
    `https://${API_HOST}/v1/info?username_or_id_or_url=${encodeURIComponent(handle)}`,
    { method: "GET", headers }
  );
  if (!infoRes.ok) {
    if (infoRes.status === 401 || infoRes.status === 403)
      throw new Error("Неверный API-ключ. Проверьте настройки (⚙).");
    if (infoRes.status === 404)
      throw new Error(`Аккаунт @${handle} не найден.`);
    throw new Error(`API вернул ошибку ${infoRes.status}.`);
  }
  const infoJson = await infoRes.json();
  const d = infoJson?.data;
  if (!d) throw new Error("Профиль не найден — пустой ответ API.");

  const followers = d.follower_count || 0;
  const name      = d.full_name || d.username || handle;
  const avatarUrl = d.profile_pic_url_hd || d.profile_pic_url || null;
  const verified  = !!(d.is_verified);

  /* 2. Recent posts */
  let realPosts  = null;
  let avgLikes   = Math.round(followers * 0.018);
  let er         = 1.8;

  try {
    const postsRes = await fetch(
      `https://${API_HOST}/v1/posts?username_or_id_or_url=${encodeURIComponent(handle)}`,
      { method: "GET", headers }
    );
    if (postsRes.ok) {
      const postsJson = await postsRes.json();
      const items = postsJson?.data?.items || [];
      if (items.length > 0) {
        const typeMap = { 1: "Фото", 2: "Видео", 8: "Карусель" };
        const iconMap = { 1: "🖼️",   2: "🎬",    8: "🗂️"     };
        realPosts = items.slice(0, 6).map((item, i) => ({
          id:       i,
          type:     typeMap[item.media_type] || "Reels",
          icon:     iconMap[item.media_type] || "🎞️",
          likes:    item.like_count    || 0,
          comments: item.comment_count || 0,
          er: followers > 0
            ? Math.max(0, +((((item.like_count || 0) + (item.comment_count || 0)) / followers) * 100).toFixed(2))
            : 0,
        }));
        avgLikes = Math.round(realPosts.reduce((s, p) => s + p.likes, 0) / realPosts.length);
        er = +(realPosts.reduce((s, p) => s + parseFloat(p.er), 0) / realPosts.length).toFixed(2);
      }
    }
  } catch (_) { /* posts fetch failed — use synthetic fallback */ }

  return buildProfile({
    id:        Date.now(),
    username:  handle,
    name,
    tag:       tag || "Реальный",
    followers,
    avgLikes:  Math.max(avgLikes, 1),
    er:        Math.max(er, 0.1),
    avatarUrl,
    realPosts,
    verified,
  });
};

/* ================================================================
   SPARKLINE
   ================================================================ */
const Sparkline = ({ data = [], color = "#a855f7", h = 40 }) => {
  const id = React.useId().replace(/:/g, "");
  if (data.length < 2) return null;
  const W = 200, H = h;
  const min = Math.min(...data), max = Math.max(...data), rng = max - min || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * W,
    H - ((v - min) / rng) * (H - 4) - 2,
  ]);
  const line = pts.map((p, i) => `${i ? "L" : "M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const area = `${line} L${pts[pts.length - 1][0].toFixed(1)},${H} L0,${H} Z`;
  return (
    <svg className="spark" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ height: h }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity=".35" />
          <stop offset="100%" stopColor={color} stopOpacity=".02" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`} />
      <path d={line} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

/* ================================================================
   LINE CHART (Chart.js)
   ================================================================ */
const LineChart = React.memo(({ labels, datasets, cacheKey }) => {
  const ref = React.useRef(null);
  const ch  = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    if (ch.current) ch.current.destroy();
    const ctx = ref.current.getContext("2d");
    ch.current = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: datasets.map(ds => {
          const g = ctx.createLinearGradient(0, 0, 0, 240);
          g.addColorStop(0, ds.color + "50");
          g.addColorStop(1, ds.color + "00");
          return {
            label:                ds.label,
            data:                 ds.data,
            borderColor:          ds.color,
            backgroundColor:      g,
            borderWidth:          2,
            tension:              0.42,
            fill:                 true,
            pointRadius:          labels.length > 14 ? 0 : 3,
            pointHoverRadius:     5,
            pointBackgroundColor: ds.color,
          };
        }),
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: "#a1a1aa", font: { size: 11 }, boxWidth: 12, padding: 14 } },
          tooltip: {
            backgroundColor: "#18181b", borderColor: "#27272a", borderWidth: 1,
            titleColor: "#fafafa", bodyColor: "#a1a1aa", padding: 10,
            callbacks: { label: c => ` ${c.dataset.label}: ${fmt(c.raw)}` },
          },
        },
        scales: {
          x: { grid: { color: "#27272a" }, ticks: { color: "#52525b", font: { size: 10 }, maxTicksLimit: 8, maxRotation: 0 } },
          y: { grid: { color: "#27272a" }, ticks: { color: "#52525b", font: { size: 10 }, callback: v => fmt(v) } },
        },
      },
    });
    return () => { if (ch.current) ch.current.destroy(); };
  }, [cacheKey]);
  return <div className="chart-wrap"><canvas ref={ref} /></div>;
});

const AddModal = ({ onClose, onAdd, onToast }) => {
  const [raw,    setRaw]    = React.useState("");
  const [note,   setNote]   = React.useState("");
  const [busy,   setBusy]   = React.useState(false);
  const [done,   setDone]   = React.useState(false);
  const [errMsg, setErrMsg] = React.useState("");

  const handle  = parseHandle(raw);
  const valid   = handle.length >= 1;
  const hasKey  = !!loadApiKey();

  const submit = async () => {
    if (!valid || busy) return;
    setErrMsg("");

    if (!hasKey) {
      /* No API key → synthetic profile */
      setBusy(true);
      await new Promise(r => setTimeout(r, 480));
      const displayName = handle.charAt(0).toUpperCase() + handle.slice(1).replace(/[._]/g, " ");
      const p = buildProfile({
        id:        Date.now(),
        username:  handle,
        name:      displayName,
        tag:       note.trim() || "Новый",
        followers: rnd(8_000, 8_000_000),
        avgLikes:  rnd(200,   80_000),
        er:        +(Math.random() * 5 + 0.7).toFixed(1),
      });
      setBusy(false);
      setDone(true);
      setTimeout(() => { onAdd(p); onClose(); }, 350);
      onToast("⚠ Добавлен с mock-данными. Введите API-ключ (⚙) для реальных данных.");
      return;
    }

    /* Real API */
    setBusy(true);
    try {
      const p = await fetchRealProfile(handle, loadApiKey(), note.trim());
      setDone(true);
      await new Promise(r => setTimeout(r, 280));
      onAdd(p);
      onClose();
      onToast(`✓ ${p.username} добавлен — данные получены из Instagram.`);
    } catch (e) {
      setBusy(false);
      setErrMsg(e.message || "Ошибка загрузки. Проверьте username и API-ключ.");
    }
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && !busy && onClose()}>
      <div className="modal">
        <div className="m-title">
          <div className="m-ic">📸</div>
          Добавить профиль
        </div>

        {!hasKey && (
          <div className="info-box info-orange">
            ⚠ API-ключ не настроен. Профиль будет добавлен с <strong>mock-данными</strong>.
            Нажмите <strong>⚙</strong> в шапке страницы, чтобы добавить ключ и получать реальные данные.
          </div>
        )}

        <div className="m-field">
          <label className="m-lbl">URL или @username Instagram-аккаунта</label>
          <input
            className="m-in"
            placeholder="@handle или instagram.com/handle"
            value={raw}
            onChange={e => { setRaw(e.target.value); setErrMsg(""); }}
            onKeyDown={e => e.key === "Enter" && submit()}
            autoFocus
            disabled={busy}
          />
          {raw.trim() && valid && (
            <div className="m-hint" style={{ color: "var(--purple)" }}>Будет добавлен: <strong>@{handle}</strong></div>
          )}
          {raw.trim() && !valid && (
            <div className="m-hint" style={{ color: "var(--red)" }}>Введите корректный username</div>
          )}
        </div>

        <div className="m-field">
          <label className="m-lbl">Категория / Заметка <span style={{ color: "var(--text-m)" }}>(необязательно)</span></label>
          <input
            className="m-in"
            placeholder="Бренд, Медиа, Конкурент, Партнёр…"
            value={note}
            onChange={e => setNote(e.target.value)}
            disabled={busy}
          />
        </div>

        {errMsg && (
          <div className="info-box info-red" style={{ marginTop: "-4px" }}>⚠ {errMsg}</div>
        )}

        <div className="m-actions">
          <button className="btn-cancel" onClick={onClose} disabled={busy}>Отмена</button>
          <button className="btn-add" onClick={submit} disabled={!valid || busy || done}>
            {busy
              ? <><div className="spinner" /><span>Загрузка…</span></>
              : done
              ? <span>✓ Готово!</span>
              : hasKey
              ? <span>🔍 Загрузить данные</span>
              : <span>✦ Добавить</span>
            }
          </button>
        </div>
      </div>
    </div>
  );
};

};

/* ================================================================
   APP
   ================================================================ */
const App = () => {
  /* Init from localStorage — fall back to mocks only on first ever load */
  const [profiles,   setProfiles]   = React.useState(() => loadProfiles() ?? INIT_PROFILES);
  const [tf,         setTf]         = React.useState("1М");
  const [selDate,    setSelDate]    = React.useState("");
  const [selId,      setSelId]      = React.useState(null);
  const [showAdd,    setShowAdd]    = React.useState(false);
  const [showSet,    setShowSet]    = React.useState(false);
  const [toast,      setToast]      = React.useState(null);
  const [catFilter,  setCatFilter]  = React.useState("Все");
  const [hasKey,     setHasKey]     = React.useState(!!loadApiKey());

  /* Persist whenever profiles change */
  React.useEffect(() => { saveProfiles(profiles); }, [profiles]);

  /* Close detail if selected profile was deleted */
  React.useEffect(() => {
    if (selId && !profiles.find(p => p.id === selId)) setSelId(null);
  }, [profiles, selId]);

  /* Refresh hasKey state when settings modal closes */
  const handleSetClose = () => {
    setShowSet(false);
    setHasKey(!!loadApiKey());
  };

  const addProfile = React.useCallback(p => {
    setProfiles(prev => [p, ...prev]);
    setSelId(p.id);
  }, []);

  const deleteProfile = React.useCallback(id => {
    setProfiles(prev => prev.filter(p => p.id !== id));
  }, []);

  const showToast = React.useCallback(msg => setToast(msg), []);

  /* Category tabs — derive unique tags from all profiles */
  const allTags = React.useMemo(
    () => ["Все", ...Array.from(new Set(profiles.map(p => p.tag).filter(Boolean)))],
    [profiles]
  );

  /* Reset filter if tag no longer exists */
  React.useEffect(() => {
    if (catFilter !== "Все" && !allTags.includes(catFilter)) setCatFilter("Все");
  }, [allTags, catFilter]);

  const filtered = catFilter === "Все" ? profiles : profiles.filter(p => p.tag === catFilter);

  /* Summary stats */
  const totalFollowers = profiles.reduce((a, p) => a + (p.followers || 0), 0);
  const avgER          = profiles.length
    ? (profiles.reduce((a, p) => a + Number(p.er || 0), 0) / profiles.length).toFixed(2)
    : "0.00";
  const selProfile = profiles.find(p => p.id === selId) || null;
  const today      = new Date().toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });

  return (
    <>
      {/* ════ HEADER ════ */}
      <header className="hdr">
        <div className="wrap">
          <div className="hdr-inner">
            <div className="logo">
              <div className="logo-ic">📸</div>
              <span className="logo-txt ig-text">Instagram Analytics Monitor</span>
            </div>
            <div className="hdr-right">
              <span style={{ fontSize: ".76rem", color: "var(--text-m)" }}>📅</span>
              <input
                type="date"
                className="date-in"
                value={selDate}
                onChange={e => setSelDate(e.target.value)}
                title="Выбрать дату"
              />
              {Object.entries(TF).map(([key, { label }]) => (
                <button key={key} className={`tf${tf === key ? " on" : ""}`} onClick={() => setTf(key)}>
                  {label}
                </button>
              ))}
              <button
                className="gear-btn"
                onClick={() => setShowSet(true)}
                title={hasKey ? "API-ключ настроен" : "Настроить API-ключ"}
              >
                ⚙
                {hasKey && <span className="gear-dot" />}
              </button>
            </div>
          </div>
        </div>
      </header>

      {/* ════ SUMMARY STRIP ════ */}
      <div className="strip">
        <div className="wrap">
          <div className="strip-inner">
            <div className="s-item">
              <span className="s-lbl">Дата</span>
              <span className="s-val" style={{ fontSize: ".84rem", color: "var(--text-s)" }}>{today}</span>
            </div>
            <div className="s-div" />
            <div className="s-item">
              <span className="s-lbl">Профилей</span>
              <span className="s-val ig-text">{profiles.length}</span>
            </div>
            <div className="s-div" />
            <div className="s-item">
              <span className="s-lbl">Всего подписчиков</span>
              <span className="s-val">{fmt(totalFollowers)}</span>
            </div>
            <div className="s-div" />
            <div className="s-item">
              <span className="s-lbl">Средний ER%</span>
              <span className="s-val" style={{ color: "var(--pink)" }}>{avgER}%</span>
            </div>
            {hasKey && (
              <>
                <div className="s-div" />
                <div className="s-item">
                  <span className="s-lbl">Источник данных</span>
                  <span className="s-val" style={{ fontSize: ".82rem", color: "var(--green)", display: "flex", alignItems: "center", gap: 5 }}>
                    <span style={{ width: 7, height: 7, background: "var(--green)", borderRadius: "50%", display: "inline-block" }} />
                    RapidAPI Live
                  </span>
                </div>
              </>
            )}
          </div>
        </div>
      </div>

      {/* ════ MAIN ════ */}
      <main className="main">
        <div className="wrap">

          {/* Top bar */}
          <div className="top-bar">
            <div className="sec-title">
              <span>◈</span>
              Отслеживаемые аккаунты
              {catFilter !== "Все" && (
                <span style={{ fontSize: ".78rem", fontWeight: 400, color: "var(--text-m)" }}>
                  — фильтр: «{catFilter}»
                </span>
              )}
            </div>
            <button className="add-btn" onClick={() => setShowAdd(true)}>
              <span style={{ fontSize: "1.1rem", lineHeight: 1 }}>+</span>
              Добавить профиль
            </button>
          </div>

          {/* Category filter tabs */}
          {allTags.length > 1 && (
            <div className="cat-tabs">
              {allTags.map(tag => (
                <button
                  key={tag}
                  className={`cat-tab${catFilter === tag ? " on" : ""}`}
                  onClick={() => setCatFilter(tag)}
                >
                  {tag}
                  {tag !== "Все" && (
                    <span className="cat-count">
                      {profiles.filter(p => p.tag === tag).length}
                    </span>
                  )}
                </button>
              ))}
            </div>
          )}

          {/* Detail panel */}
          {selProfile && (
            <Detail
              key={selProfile.id}
              p={selProfile}
              tf={tf}
              onClose={() => setSelId(null)}
              onDelete={deleteProfile}
            />
          )}

          {/* Cards grid or empty state */}
          {filtered.length === 0 ? (
            <div className="empty">
              <div className="empty-ic">📊</div>
              <div className="empty-t">
                {catFilter !== "Все"
                  ? `Нет профилей в категории «${catFilter}».`
                  : "Нет отслеживаемых профилей.\nНажмите «Добавить профиль», чтобы начать."
                }
              </div>
            </div>
          ) : (
            <div className="grid">
              {filtered.map(p => (
                <Card
                  key={p.id}
                  p={p}
                  tf={tf}
                  selected={selId === p.id}
                  onClick={() => setSelId(selId === p.id ? null : p.id)}
                  onDelete={deleteProfile}
                />
              ))}
            </div>
          )}

        </div>
      </main>

      {/* ════ MODALS ════ */}
      {showAdd && (
        <AddModal
          onClose={() => setShowAdd(false)}
          onAdd={addProfile}
          onToast={showToast}
        />
      )}
      {showSet && (
        <SettingsModal onClose={handleSetClose} />
      )}

      {/* ════ TOAST ════ */}
      {toast && <Toast msg={toast} onHide={() => setToast(null)} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
